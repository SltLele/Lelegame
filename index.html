<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lele游戏库 · 多语言</title>
    <style>
        /* ===== 全局重置 ===== */
        * { margin:0; padding:0; box-sizing:border-box; }

        /* ===== 动态渐变背景 ===== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding: 20px;
            background: #0f0f1a;
            color: #e0e0e0;
            transition: background 0.5s, color 0.5s;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 40%, #16213e 70%, #0f0f1a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: radial-gradient(ellipse at 30% 40%, rgba(124,92,252,0.08) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(252,92,124,0.06) 0%, transparent 50%);
            animation: glowMove 20s infinite alternate;
        }
        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }

        body.light {
            background: #f5f5f7;
            color: #222;
        }
        body.light::before {
            background: linear-gradient(135deg, #f5f5f7 0%, #e8e8ec 40%, #dcdce0 70%, #f5f5f7 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        body.light::after {
            background: radial-gradient(ellipse at 30% 40%, rgba(124,92,252,0.05) 0%, transparent 60%),
                        radial-gradient(ellipse at 70% 60%, rgba(252,92,124,0.04) 0%, transparent 50%);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }

        /* ===== 顶部栏 ===== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        body.light .top-bar { border-bottom-color: rgba(0,0,0,0.08); }
        .top-bar .brand {
            font-size:1.2rem; font-weight:600; letter-spacing:1px;
            color:#ccc;
        }
        body.light .top-bar .brand { color:#333; }
        .top-bar .brand span {
            background: linear-gradient(135deg, #7c5cfc, #fc5c7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-bar .actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        /* 按钮通用样式 */
        .top-btn, .lang-select {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            color: #ccc;
            padding: 6px 16px;
            border-radius: 30px;
            font-size:0.85rem;
            cursor:pointer;
            font-family:inherit;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .top-btn::before, .lang-select::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(124,92,252,0.2), transparent 70%);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .top-btn:hover::before, .lang-select:hover::before { opacity: 1; }
        .top-btn:hover, .lang-select:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(124,92,252,0.3);
            border-color: #7c5cfc;
            color: #fff;
        }
        body.light .top-btn,
        body.light .lang-select {
            background: rgba(0,0,0,0.04);
            border-color: rgba(0,0,0,0.10);
            color: #333;
        }
        body.light .top-btn:hover,
        body.light .lang-select:hover {
            background: rgba(124,92,252,0.08);
            border-color: #7c5cfc;
            color: #7c5cfc;
            box-shadow: 0 8px 30px rgba(124,92,252,0.15);
        }

        /* ===== 语言选择框：使用原生下拉箭头，无自定义背景 ===== */
        .lang-select {
            /* 移除 appearance: none，恢复原生下拉箭头 */
            appearance: auto;
            -webkit-appearance: auto;
            /* 移除背景图相关设置 */
            background-image: none;
            padding-right: 16px; /* 正常内边距 */
        }

        /* ===== 其余样式保持不变 ===== */
        .header { text-align:center; padding:30px 20px 20px; margin-bottom:10px; }
        .header h1 {
            font-size:4rem; font-weight:800;
            background: linear-gradient(135deg, #7c5cfc, #fc5c7c, #f5a623);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing:4px; margin-bottom:6px;
            animation: titlePulse 3s ease-in-out infinite;
        }
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }
        .header .subtitle {
            font-size:1.1rem; color:rgba(255,255,255,0.5);
            letter-spacing:6px; font-weight:300;
            animation: subtitleFade 4s ease-in-out infinite;
        }
        @keyframes subtitleFade {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        body.light .header .subtitle { color:#888; }

        .intro {
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:20px;
            padding:30px 40px;
            margin:10px auto 30px;
            max-width:820px;
            text-align:center;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .intro::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(124,92,252,0.05), transparent 60%);
            animation: introGlow 8s infinite alternate;
        }
        @keyframes introGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(5%, 5%) scale(1.2); }
        }
        .intro p {
            font-size:1.05rem; line-height:1.8;
            color:rgba(255,255,255,0.75); font-weight:300;
            position: relative;
            z-index: 1;
        }
        body.light .intro p { color:#444; }
        .intro .highlight { color:#7c5cfc; font-weight:500; }
        .intro .highlight2 { color:#fc5c7c; font-weight:500; }

        .stats {
            display:flex; justify-content:center; align-items:center;
            gap:12px; margin:20px auto 24px;
            padding:10px 32px;
            background: rgba(255,255,255,0.04);
            border-radius:60px;
            border:1px solid rgba(255,255,255,0.06);
            width:fit-content;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.3s;
        }
        body.light .stats {
            background: rgba(0,0,0,0.02);
            border-color: rgba(0,0,0,0.06);
        }
        .stats .number {
            font-size:2rem; font-weight:700;
            background: linear-gradient(135deg, #7c5cfc, #fc5c7c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height:1;
        }
        .stats .label {
            font-size:1rem; color:rgba(255,255,255,0.6); font-weight:300;
        }
        body.light .stats .label { color:#666; }

        .search-section { max-width:560px; margin:10px auto 30px; padding:0 10px; }
        .search-input {
            width:100%; padding:14px 22px;
            border-radius:60px;
            border:1px solid rgba(255,255,255,0.10);
            background: rgba(255,255,255,0.05);
            color:#e0e0e0; font-size:1rem;
            outline:none; transition:all 0.3s ease;
            font-family:inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
        }
        body.light .search-input {
            border-color:rgba(0,0,0,0.10);
            background:rgba(0,0,0,0.02);
            color:#222;
            box-shadow:0 4px 20px rgba(0,0,0,0.04);
        }
        .search-input::placeholder {
            color:rgba(255,255,255,0.30); font-weight:300; letter-spacing:0.5px;
        }
        body.light .search-input::placeholder { color:#aaa; }
        .search-input:focus {
            border-color:#7c5cfc;
            background:rgba(255,255,255,0.08);
            box-shadow:0 0 0 4px rgba(124,92,252,0.15), 0 8px 30px rgba(124,92,252,0.1);
        }
        body.light .search-input:focus {
            background:rgba(124,92,252,0.04);
            box-shadow:0 0 0 4px rgba(124,92,252,0.10), 0 8px 30px rgba(124,92,252,0.05);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap:28px;
            margin-top:10px;
            padding-bottom:30px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius:20px;
            padding:20px 12px 16px;
            text-align:center;
            cursor:pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration:none;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            min-height:200px;
            position:relative;
            overflow:hidden;
            border:1px solid rgba(255,255,255,0.06);
            opacity:0;
            animation: cardEntrance 0.6s ease forwards;
        }
        .game-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            padding: 2px;
            background: linear-gradient(135deg, rgba(124,92,252,0), rgba(124,92,252,0.3), rgba(252,92,124,0.3), rgba(124,92,252,0));
            background-size: 300% 300%;
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }
        .game-card:hover::before {
            opacity: 1;
            animation: borderFlow 3s linear infinite;
        }
        @keyframes borderFlow {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        .game-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(124,92,252,0.1), transparent 60%);
            opacity: 0;
            transition: opacity 0.5s;
            pointer-events: none;
        }
        .game-card:hover::after {
            opacity: 1;
        }
        .game-card:hover {
            transform: translateY(-8px) scale(1.02);
            background: rgba(255,255,255,0.08);
            border-color: rgba(124,92,252,0.3);
            box-shadow: 0 20px 60px rgba(124,92,252,0.2);
        }
        body.light .game-card {
            background: rgba(0,0,0,0.02);
            border-color: rgba(0,0,0,0.06);
        }
        body.light .game-card:hover {
            background: rgba(124,92,252,0.04);
            border-color: #7c5cfc;
            box-shadow: 0 20px 40px rgba(124,92,252,0.15);
        }
        .game-card:active { transform:scale(0.96); }

        @keyframes cardEntrance {
            0% { opacity:0; transform: translateY(30px) scale(0.95) rotate(-2deg); }
            100% { opacity:1; transform: translateY(0) scale(1) rotate(0); }
        }
        .game-card:nth-child(1) { animation-delay:0.05s; }
        .game-card:nth-child(2) { animation-delay:0.10s; }
        .game-card:nth-child(3) { animation-delay:0.15s; }
        .game-card:nth-child(4) { animation-delay:0.20s; }
        .game-card:nth-child(5) { animation-delay:0.25s; }
        .game-card:nth-child(6) { animation-delay:0.30s; }
        .game-card:nth-child(7) { animation-delay:0.35s; }
        .game-card:nth-child(8) { animation-delay:0.40s; }
        .game-card:nth-child(9) { animation-delay:0.45s; }
        .game-card:nth-child(10){ animation-delay:0.50s; }
        .game-card:nth-child(11){ animation-delay:0.55s; }
        .game-card:nth-child(12){ animation-delay:0.60s; }
        .game-card:nth-child(13){ animation-delay:0.65s; }
        .game-card:nth-child(14){ animation-delay:0.70s; }
        .game-card:nth-child(15){ animation-delay:0.75s; }
        .game-card:nth-child(16){ animation-delay:0.80s; }
        .game-card:nth-child(17){ animation-delay:0.85s; }
        .game-card:nth-child(18){ animation-delay:0.90s; }
        .game-card:nth-child(19){ animation-delay:0.95s; }
        .game-card:nth-child(20){ animation-delay:1.00s; }

        .game-icon {
            width:96px; height:96px;
            border-radius:18px;
            object-fit:cover;
            background: rgba(255,255,255,0.06);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            transition: all 0.4s ease;
            border:1px solid rgba(255,255,255,0.06);
            flex-shrink:0;
        }
        body.light .game-icon {
            background: rgba(0,0,0,0.04);
            box-shadow: 0 8px 24px rgba(0,0,0,0.06);
            border-color: rgba(0,0,0,0.06);
        }
        .game-card:hover .game-icon {
            transform: scale(1.05) rotate(-2deg);
            box-shadow: 0 12px 36px rgba(124,92,252,0.25);
            border-color: #7c5cfc;
        }
        body.light .game-card:hover .game-icon {
            box-shadow: 0 12px 36px rgba(124,92,252,0.15);
        }

        .game-name {
            margin-top:14px;
            font-size:0.95rem; font-weight:500;
            color:rgba(255,255,255,0.9);
            letter-spacing:0.5px; line-height:1.4;
            word-break:break-all;
            max-width:100%;
            display:-webkit-box;
            -webkit-line-clamp:2;
            -webkit-box-orient:vertical;
            overflow:hidden; text-overflow:ellipsis;
            transition:color 0.3s ease;
        }
        body.light .game-name { color:#222; }
        .game-card:hover .game-name { color:#ffffff; }
        body.light .game-card:hover .game-name { color:#7c5cfc; }

        .game-card.hidden { display:none !important; }

        .empty-state {
            grid-column:1/-1;
            text-align:center; padding:80px 20px;
            color:rgba(255,255,255,0.3);
        }
        body.light .empty-state { color:#888; }
        .empty-state .emoji { font-size:4rem; display:block; margin-bottom:20px; }
        .empty-state h3 { font-size:1.5rem; font-weight:400; color:rgba(255,255,255,0.5); }
        body.light .empty-state h3 { color:#555; }
        .empty-state p { margin-top:10px; font-size:0.95rem; color:rgba(255,255,255,0.25); }
        body.light .empty-state p { color:#aaa; }

        .footer {
            text-align:center; padding:30px 0 10px;
            color:rgba(255,255,255,0.15);
            font-size:0.8rem; letter-spacing:2px;
            border-top:1px solid rgba(255,255,255,0.04);
            margin-top:20px;
        }
        body.light .footer { color:#aaa; border-top-color:rgba(0,0,0,0.06); }

        /* ===== 低版本适配模式 ===== */
        body.compat-mode::before,
        body.compat-mode::after {
            display: none !important;
        }
        body.compat-mode .header h1 {
            animation: none !important;
        }
        body.compat-mode .header .subtitle {
            animation: none !important;
        }
        body.compat-mode .intro::before {
            display: none !important;
        }
        body.compat-mode .game-card::before,
        body.compat-mode .game-card::after {
            display: none !important;
        }
        body.compat-mode .game-card {
            animation: none !important;
            opacity: 1 !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.compat-mode .game-card:hover {
            transform: none !important;
            box-shadow: none !important;
        }
        body.compat-mode .top-btn::before,
        body.compat-mode .lang-select::before {
            display: none !important;
        }
        body.compat-mode .top-btn:hover,
        body.compat-mode .lang-select:hover {
            transform: none !important;
            box-shadow: none !important;
        }
        body.compat-mode .search-input {
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.compat-mode .intro,
        body.compat-mode .stats {
            background: #f5f5f5 !important;
            border-radius: 8px !important;
            border: 1px solid #ccc !important;
            backdrop-filter: none !important;
            -webkit-backdrop-filter: none !important;
        }
        body.compat-mode .game-grid {
            display: block !important;
            text-align: center !important;
            font-size: 0 !important;
        }
        body.compat-mode .game-card {
            display: inline-block !important;
            vertical-align: top !important;
            width: 180px !important;
            margin: 10px !important;
            background: #f9f9f9 !important;
            border: 1px solid #ccc !important;
            border-radius: 8px !important;
            padding: 16px 10px 14px !important;
            min-height: 180px !important;
            box-shadow: none !important;
            text-align: center !important;
        }
        body.compat-mode .game-card:hover {
            background: #efefef !important;
            border-color: #999 !important;
        }
        body.compat-mode .game-icon {
            border-radius: 8px !important;
            box-shadow: none !important;
            border: 1px solid #bbb !important;
            width: 80px !important;
            height: 80px !important;
        }
        body.compat-mode .game-name {
            color: #222 !important;
            font-size: 0.9rem !important;
            -webkit-line-clamp: unset !important;
            display: block !important;
            overflow: visible !important;
            text-overflow: clip !important;
        }
        body.compat-mode .search-input {
            background: #f9f9f9 !important;
            border-color: #ccc !important;
            border-radius: 30px !important;
            color: #222 !important;
            box-shadow: none !important;
        }
        body.compat-mode .search-input:focus {
            border-color: #888 !important;
            box-shadow: 0 0 0 2px rgba(0,0,0,0.05) !important;
            background: #fff !important;
        }
        body.compat-mode .header h1 {
            background: none !important;
            -webkit-text-fill-color: #7c5cfc !important;
            color: #7c5cfc !important;
        }
        body.compat-mode .stats .number {
            background: none !important;
            -webkit-text-fill-color: #7c5cfc !important;
            color: #7c5cfc !important;
        }
        body.compat-mode .top-btn,
        body.compat-mode .lang-select {
            background: #e8e8e8 !important;
            border-color: #bbb !important;
            color: #333 !important;
        }
        body.compat-mode .top-btn:hover,
        body.compat-mode .lang-select:hover {
            background: #d0d0d0 !important;
            border-color: #999 !important;
        }
        body.compat-mode .footer {
            border-top-color: #ddd !important;
            color: #aaa !important;
        }
        body.compat-mode.light {
            background: #f5f5f5 !important;
            color: #222 !important;
        }
        body.compat-mode.light .intro,
        body.compat-mode.light .stats,
        body.compat-mode.light .game-card {
            background: #f9f9f9 !important;
            border-color: #ccc !important;
        }
        body.compat-mode.light .game-name {
            color: #222 !important;
        }
        body.compat-mode.light .header .subtitle {
            color: #666 !important;
        }

        /* ===== 响应式 ===== */
        @media (max-width:1024px) {
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:20px; }
            body.compat-mode .game-card { width:160px !important; margin:8px !important; }
        }
        @media (max-width:768px) {
            .header h1 { font-size:2.8rem; }
            .header .subtitle { font-size:0.9rem; letter-spacing:4px; }
            .intro { padding:20px 24px; margin:0 0 20px; }
            .intro p { font-size:0.95rem; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap:16px; }
            .game-icon { width:80px; height:80px; border-radius:16px; }
            .game-card { min-height:170px; padding:16px 8px 14px; }
            .game-name { font-size:0.85rem; }
            .stats { padding:10px 24px; }
            .stats .number { font-size:1.6rem; }
            body.compat-mode .game-card { width:140px !important; margin:6px !important; min-height:150px !important; }
            body.compat-mode .game-icon { width:70px !important; height:70px !important; }
        }
        @media (max-width:480px) {
            body { padding:12px; }
            .header h1 { font-size:2.2rem; letter-spacing:2px; }
            .header { padding:20px 10px 20px; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap:12px; }
            .game-icon { width:68px; height:68px; border-radius:14px; }
            .game-card { min-height:150px; padding:14px 6px 12px; border-radius:14px; }
            .game-name { font-size:0.78rem; margin-top:10px; }
            .intro { padding:16px 18px; border-radius:14px; }
            .intro p { font-size:0.88rem; line-height:1.6; }
            .stats { padding:8px 18px; gap:8px; border-radius:40px; margin:14px 0 20px; }
            .stats .number { font-size:1.4rem; }
            .stats .label { font-size:0.85rem; }
            body.compat-mode .game-card { width:120px !important; margin:4px !important; min-height:130px !important; padding:10px 4px 8px !important; }
            body.compat-mode .game-icon { width:60px !important; height:60px !important; }
            body.compat-mode .game-name { font-size:0.75rem !important; }
            .top-bar .brand { font-size:1rem; }
            .top-btn, .lang-select { font-size:0.75rem; padding:4px 12px; }
        }
        ::-webkit-scrollbar { width:6px; height:6px; }
        ::-webkit-scrollbar-track { background:rgba(255,255,255,0.02); border-radius:10px; }
        ::-webkit-scrollbar-thumb { background:rgba(124,92,252,0.3); border-radius:10px; }
        ::-webkit-scrollbar-thumb:hover { background:rgba(124,92,252,0.5); }
        body.light ::-webkit-scrollbar-track { background:rgba(0,0,0,0.02); }
        body.light ::-webkit-scrollbar-thumb { background:rgba(124,92,252,0.2); }
    </style>
</head>
<body>

<div class="container">
    <!-- 顶部栏 -->
    <div class="top-bar">
        <div class="brand">🎮 <span data-i18n="brand">Lele游戏库</span></div>
        <div class="actions">
            <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="zh-TW">繁體中文</option>
            </select>
            <button class="top-btn" id="themeToggle" onclick="toggleTheme()" data-i18n="themeBtn">🌗 切换深色</button>
            <button class="top-btn" id="compatToggle" onclick="toggleCompat()" data-i18n="compatBtn">🔄 低版本适配模式</button>
        </div>
    </div>

    <!-- 头部 -->
    <header class="header">
        <h1>🎮 <span data-i18n="title">Lele游戏库</span></h1>
        <div class="subtitle" data-i18n="subtitle">✦ 发现 · 游玩 · 快乐 ✦</div>
    </header>

    <!-- 介绍 -->
    <section class="intro">
        <p data-i18n="introText">
            欢迎来到 <span class="highlight">Lele游戏库</span> —— 一个属于游戏爱好者的温暖小站。
            这里收集了各式各样的 <span class="highlight2">HTML 小游戏</span>，
            每一款都承载着一段有趣的创意与时光。
            点击卡片即可开始游玩，愿你在像素与代码的世界里，
            找回最纯粹的快乐 🎉
        </p>
    </section>

    <!-- 统计 -->
    <div class="stats">
        <span class="number" id="gameCount">0</span>
        <span class="label" data-i18n="statsLabel">款游戏 · 等你来玩</span>
    </div>

    <!-- 搜索 -->
    <div class="search-section">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索游戏名称..." data-i18n-placeholder="searchPlaceholder">
    </div>

    <!-- 游戏列表 -->
    <div class="game-grid" id="gameGrid"></div>

    <!-- 页脚 -->
    <footer class="footer" data-i18n="footer">Lele游戏库 · 用代码编织快乐</footer>
</div>

<!-- 加载游戏列表配置 -->
<script src="games.js"></script>

<script>
    (function() {
        'use strict';

        // ========== 语言包 ==========
        var translations = {
            'zh': {
                brand: 'Lele游戏库',
                title: 'Lele游戏库',
                subtitle: '✦ 发现 · 游玩 · 快乐 ✦',
                introText: '欢迎来到 <span class="highlight">Lele游戏库</span> —— 一个属于游戏爱好者的温暖小站。这里收集了各式各样的 <span class="highlight2">HTML 小游戏</span>，每一款都承载着一段有趣的创意与时光。点击卡片即可开始游玩，愿你在像素与代码的世界里，找回最纯粹的快乐 🎉',
                statsLabel: '款游戏 · 等你来玩',
                searchPlaceholder: '🔍 搜索游戏名称...',
                themeBtn: '切换深色',
                compatBtn: '低版本适配模式',
                footer: 'Lele游戏库 · 用代码编织快乐',
                emptyTitle: '游戏库还是空的',
                emptyDesc: '请在 <strong>games.js</strong> 中添加游戏配置',
                emptyHint: '格式：{ name: "游戏名", file: "xxx.html" }',
                noMatchTitle: '没有找到匹配的游戏',
                noMatchDesc: '试试其他关键词吧'
            },
            'en': {
                brand: 'Lele Game Library',
                title: 'Lele Game Library',
                subtitle: '✦ Discover · Play · Enjoy ✦',
                introText: 'Welcome to <span class="highlight">Lele Game Library</span> — a cozy corner for game lovers. Here we collect various <span class="highlight2">HTML mini-games</span>, each carrying a piece of creative fun. Click a card to start playing, and may you find the purest joy in the world of pixels and code 🎉',
                statsLabel: 'games · waiting for you',
                searchPlaceholder: '🔍 Search game name...',
                themeBtn: 'Toggle Dark Mode',
                compatBtn: 'Legacy Mode',
                footer: 'Lele Game Library · Crafting joy with code',
                emptyTitle: 'Game library is empty',
                emptyDesc: 'Please add game entries in <strong>games.js</strong>',
                emptyHint: 'Format: { name: "Game Name", file: "xxx.html" }',
                noMatchTitle: 'No matching games found',
                noMatchDesc: 'Try other keywords'
            },
            'zh-TW': {
                brand: 'Lele遊戲庫',
                title: 'Lele遊戲庫',
                subtitle: '✦ 發現 · 遊玩 · 快樂 ✦',
                introText: '歡迎來到 <span class="highlight">Lele遊戲庫</span> —— 一個屬於遊戲愛好者的溫暖小站。這裡收集了各式各樣的 <span class="highlight2">HTML 小遊戲</span>，每一款都承載著一段有趣的創意與時光。點擊卡片即可開始遊玩，願你在像素與代碼的世界裡，找回最純粹的快樂 🎉',
                statsLabel: '款遊戲 · 等你來玩',
                searchPlaceholder: '🔍 搜尋遊戲名稱...',
                themeBtn: '切換深色',
                compatBtn: '低版本適配模式',
                footer: 'Lele遊戲庫 · 用代碼編織快樂',
                emptyTitle: '遊戲庫還是空的',
                emptyDesc: '請在 <strong>games.js</strong> 中添加遊戲配置',
                emptyHint: '格式：{ name: "遊戲名", file: "xxx.html" }',
                noMatchTitle: '沒有找到匹配的遊戲',
                noMatchDesc: '試試其他關鍵詞吧'
            }
        };

        // ========== DOM 引用 ==========
        var body = document.body;
        var themeBtn = document.getElementById('themeToggle');
        var compatBtn = document.getElementById('compatToggle');
        var searchInput = document.getElementById('searchInput');
        var grid = document.getElementById('gameGrid');
        var gameCount = document.getElementById('gameCount');
        var langSelect = document.getElementById('langSelect');

        // ========== 安全存储 ==========
        function getStorage(key, def) {
            try { var v = localStorage.getItem(key); return v !== null ? v : def; } catch(e) { return def; }
        }
        function setStorage(key, val) {
            try { localStorage.setItem(key, val); } catch(e) {}
        }

        // ========== 主题 ==========
        var isDark = getStorage('leleTheme', 'dark') !== 'light';
        function applyTheme(dark) {
            if (dark) {
                body.classList.remove('light');
                setStorage('leleTheme', 'dark');
            } else {
                body.classList.add('light');
                setStorage('leleTheme', 'light');
            }
            isDark = dark;
            updateLanguage();
        }
        window.toggleTheme = function() { applyTheme(!isDark); };

        // ========== 兼容模式 ==========
        var compatMode = getStorage('leleCompatMode', 'false') === 'true';
        function applyCompat(mode) {
            if (mode) {
                body.classList.add('compat-mode');
                setStorage('leleCompatMode', 'true');
            } else {
                body.classList.remove('compat-mode');
                setStorage('leleCompatMode', 'false');
            }
            compatMode = mode;
            updateLanguage();
        }
        window.toggleCompat = function() { applyCompat(!compatMode); };

        // ========== 语言 ==========
        var currentLang = getStorage('leleLang', 'zh');
        langSelect.value = currentLang;

        function changeLanguage(lang) {
            currentLang = lang;
            setStorage('leleLang', lang);
            updateLanguage();
            renderGames(gamesData || []);
        }
        window.changeLanguage = changeLanguage;

        // ========== 更新界面文字 ==========
        function updateLanguage() {
            var langData = translations[currentLang] || translations['zh'];
            document.querySelectorAll('[data-i18n]').forEach(function(el) {
                var key = el.getAttribute('data-i18n');
                if (key && langData[key] !== undefined) {
                    el.innerHTML = langData[key];
                }
            });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el) {
                var key = el.getAttribute('data-i18n-placeholder');
                if (key && langData[key] !== undefined) {
                    el.placeholder = langData[key];
                }
            });
            var themeIcon = isDark ? '☀️ ' : '🌗 ';
            var compatIcon = compatMode ? '✨ ' : '🔄 ';
            themeBtn.textContent = themeIcon + langData.themeBtn;
            compatBtn.textContent = compatIcon + langData.compatBtn;
        }

        // ========== 渲染卡片 ==========
        function renderGames(list) {
            var langData = translations[currentLang] || translations['zh'];
            grid.innerHTML = '';
            if (!list || list.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <span class="emoji">📂</span>
                        <h3>${langData.emptyTitle}</h3>
                        <p>${langData.emptyDesc}</p>
                        <p style="margin-top:6px;font-size:0.8rem;color:rgba(255,255,255,0.2);">${langData.emptyHint}</p>
                    </div>
                `;
                gameCount.textContent = '0';
                return;
            }
            list.forEach(function(game) {
                var card = document.createElement('a');
                card.className = 'game-card';
                card.href = 'game/' + game.file;
                card.setAttribute('data-name', game.name.toLowerCase());

                var defaultIconSvg = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120"%3E%3Crect width="120" height="120" rx="16" fill="%232d2d3f"/%3E%3Ccircle cx="40" cy="45" r="14" fill="%237c5cfc" opacity="0.8"/%3E%3Ccircle cx="80" cy="45" r="14" fill="%23fc5c7c" opacity="0.8"/%3E%3Crect x="30" y="70" width="60" height="16" rx="4" fill="%23f5a623"/%3E%3Crect x="45" y="58" width="30" height="8" rx="2" fill="%23f5a623"/%3E%3C/svg%3E';
                var iconSrc = game.icon || 'photo/' + encodeURIComponent(game.name) + '.png';

                var img = document.createElement('img');
                img.className = 'game-icon';
                img.src = iconSrc;
                img.alt = game.name;
                img.loading = 'lazy';
                img.onerror = function() {
                    this.onerror = null;
                    this.src = defaultIconSvg;
                };

                var nameSpan = document.createElement('span');
                nameSpan.className = 'game-name';
                nameSpan.textContent = game.name;

                card.appendChild(img);
                card.appendChild(nameSpan);
                grid.appendChild(card);
            });
            gameCount.textContent = list.length;
        }

        // ========== 搜索过滤 ==========
        function filterGames() {
            var keyword = searchInput.value.toLowerCase().trim();
            var cards = grid.querySelectorAll('.game-card');
            var hasVisible = false;
            var langData = translations[currentLang] || translations['zh'];
            cards.forEach(function(card) {
                var name = card.getAttribute('data-name') || '';
                if (name.indexOf(keyword) !== -1) {
                    card.classList.remove('hidden');
                    hasVisible = true;
                } else {
                    card.classList.add('hidden');
                }
            });
            var emptyMsg = grid.querySelector('.empty-search-msg');
            if (!hasVisible && cards.length > 0) {
                if (!emptyMsg) {
                    var msg = document.createElement('div');
                    msg.className = 'empty-state empty-search-msg';
                    msg.innerHTML = `<span class="emoji">🔍</span><h3>${langData.noMatchTitle}</h3><p>${langData.noMatchDesc}</p>`;
                    grid.appendChild(msg);
                }
            } else {
                if (emptyMsg) emptyMsg.remove();
            }
        }

        if (searchInput) {
            searchInput.oninput = filterGames;
            searchInput.onsearch = filterGames;
        }

        // ========== 初始化 ==========
        function init() {
            applyTheme(isDark);
            applyCompat(compatMode);
            langSelect.value = currentLang;
            updateLanguage();
            if (typeof gamesData !== 'undefined') {
                renderGames(gamesData);
            } else {
                renderGames([]);
                console.warn('未找到 gamesData，请确保 games.js 已正确加载。');
            }
            console.log('🎮 Lele游戏库 多语言版已加载，语言：' + currentLang + '，游戏数：' + (typeof gamesData !== 'undefined' ? gamesData.length : 0));
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>

</body>
</html>
